services:

  shopping-service:
    build:
      context: ./shopping-service
      dockerfile: Dockerfile
    container_name: shopping-service
    ports:
      - "8085:8085"
    depends_on:
      - consul
      - config-server
      - mysql-shopping
      - rabbitmq
      - menu-service
    networks:
      - mealplanner-network
    restart: unless-stopped

  menu-service:
    build:
      context: ./menu-service
      dockerfile: Dockerfile
    container_name: menu-service
    ports:
      - "8084:8084"
    depends_on:
      - consul
      - config-server
      - mysql-menu
      - rabbitmq
      - recipe-service
    networks:
      - mealplanner-network
    restart: unless-stopped

  recipe-service:
    build:
      context: ./recipe-service
      dockerfile: Dockerfile
    container_name: recipe-service
    ports:
      - "8083:8083"
    depends_on:
      - consul
      - config-server
      - mysql-recipe
    networks:
      - mealplanner-network
    restart: unless-stopped

  profile-service:
    build:
      context: ./profile-service
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "8082:8082"
    depends_on:
      - consul
      - config-server
      - mysql-profile
      - auth-service
    networks:
      - mealplanner-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - consul
      - config-server
      - mysql-auth
    networks:
      - mealplanner-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8222:8222"

    # attends consul & config-server pour démarrer
    depends_on:
      - consul
      - config-server
    networks:
      - mealplanner-network
    restart: unless-stopped

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    # attends que consul démarre
    depends_on:
      - consul
    networks:
      - mealplanner-network
    restart: unless-stopped

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_AUTH_DB}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - mealplanner-network

  mysql-profile:
      image: mysql:8.0
      container_name: mysql-profile
      ports:
        - "3308:3306"
      environment:
        MYSQL_DATABASE: ${MYSQL_PROFILE_DB}
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      networks:
        - mealplanner-network

  mysql-recipe:
      image: mysql:8.0
      container_name: mysql-recipe
      ports:
        - "3309:3306"
      environment:
        MYSQL_DATABASE: ${MYSQL_RECIPE_DB}
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      networks:
        - mealplanner-network

  mysql-menu:
      image: mysql:8.0
      container_name: mysql-menu
      ports:
        - "3310:3306"
      environment:
        MYSQL_DATABASE: ${MYSQL_MENU_DB}
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      networks:
        - mealplanner-network

  mysql-shopping:
      image: mysql:8.0
      container_name: mysql-shopping
      ports:
        - "3311:3306"
      environment:
        MYSQL_DATABASE: ${MYSQL_SHOPPING_DB}
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      networks:
        - mealplanner-network

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: keycloak
    # interface web Keycloak accessible http://localhost:8080
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: "start-dev"
    networks:
      - mealplanner-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      # port de communication en tre les microservices et RabbitMQ
      - "5672:5672"
      # interface web RabbitMQ zccecible http://localhost:15672
      - "15672:15672"
    environment:
      # juste les identifiants par défaut pour accéder à l'interface
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - mealplanner-network

  consul:
    image: hashicorp/consul:1.15
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    networks:
      - mealplanner-network

networks:
  mealplanner-network:
    driver: bridge

