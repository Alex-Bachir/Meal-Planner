server:
  port: 8083

spring:
  application:
    name: recipe-service
  datasource:
    url: jdbc:mysql://mysql-recipe:3306/${MYSQL_RECIPE_DB}
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: recipe-service
        health-check-path: /actuator/health
        health-check-interval: 10s

management:
  endpoints:
    web:
      exposure:
        include: "*"